# Netlify deploy config for HireAssist.
# The React app lives in /client. Functions live at /netlify/functions.
#
# Set GROQ_API_KEY in the Netlify dashboard:
#   Site settings → Environment variables → GROQ_API_KEY = <your key>

[build]
  base = "/"
  command = "cd client && npm install && npm run build"
  publish = "client/dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# SPA fallback so React Router routes (e.g. /student/ai) deep-link cleanly.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
